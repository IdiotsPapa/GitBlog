baseURL = "https://idiotspapa.github.io/GitBlog/"
title = "[이름] — Portfolio"
theme = "PaperMod"
languageCode = "ko"
enableRobotsTXT = true
summaryLength = 40

[pagination]
  pagerSize = 10

[params]
  author = "[이름]"
  description = "C# / ASP.NET 사내 시스템 개발·운영과 AI 도구 활용 포트폴리오"
  defaultTheme = "dark"
  disableThemeToggle = true
  ShowReadingTime = false
  ShowShareButtons = false
  ShowCodeCopyButtons = true
  ShowPostNavLinks = false
  ShowBreadCrumbs = false
  ShowFullTextinRSS = false
  comments = false
  disableSpecial1stPost = true
  hideFooter = false
  DateFormat = "2006-01-02"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/IdiotsPapa"

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1

  [[menu.main]]
    name = "Projects"
    url = "/projects/"
    weight = 2

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    lineNos = false
    noClasses = false
    style = "monokai"
